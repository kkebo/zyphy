name: ci
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
permissions: {}
defaults:
  run:
    shell: bash -euo pipefail {0}
jobs:
  test-linux:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: recursive
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.cache/org.swift.swiftpm
            ~/.swiftpm
            .build
          key: ${{ runner.os }}-swiftpm-${{ hashFiles('Package.resolved') }}
          restore-keys: ${{ runner.os }}-swiftpm-
      - run: ./scripts/ci-install-swift.sh
      - run: swift --version
      - run: swift build --explicit-target-dependency-import-check error --build-tests --disable-xctest --enable-code-coverage
      - run: swift test --skip-build --disable-xctest --enable-code-coverage
      - name: llvm-cov export
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: llvm-cov export .build/out/Products/Debug-linux/TreeBuilderTests.so --instr-profile=.build/out/Products/Debug-linux/codecov/default.profdata --format=lcov --ignore-filename-regex=".build|Tests|TokenizerMacros" > coverage.lcov
      - name: Install lcov2xml
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: |
          curl -Lo lcov2xml https://github.com/mike-kfed/lcov2cobertura/releases/download/1.0.9/lcov2xml-aarch64-unknown-linux-musl
          chmod +x lcov2xml
      - run: ./lcov2xml -o coverage.xml coverage.lcov
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        with:
          name: coverage-xml
          path: coverage.xml
  test-macos:
    runs-on: macos-26
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: recursive
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/org.swift.swiftpm
            ~/.swiftpm
            .build
          key: ${{ runner.os }}-swiftpm-${{ hashFiles('Package.resolved') }}
          restore-keys: ${{ runner.os }}-swiftpm-
      - run: ./scripts/ci-install-swift.sh
      - run: swift --version
      - run: swift test --explicit-target-dependency-import-check error --disable-xctest
  upload-coverage:
    if: ${{ !cancelled() && needs.test-linux.result == 'success' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    needs: test-linux
    runs-on: ubuntu-24.04-arm
    continue-on-error: true
    permissions:
      code-quality: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: coverage-xml
      - uses: actions/upload-code-coverage@b51da2c3c1b23e04d2d6477cfc34350b1f5cd3e9  # v1.2.0
        with:
          file: coverage.xml
          language: Swift
          label: code-coverage
  lint:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - run: ./scripts/ci-install-swift.sh
      - run: swift format lint -rsp .
  benchmark:
    if: ${{ github.event_name == 'pull_request' }}
    needs: test-linux
    runs-on: ubuntu-24.04-arm
    outputs:
      SUMMARY: ${{ steps.summary.outputs.SUMMARY }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - run: ./scripts/ci-install-swift.sh
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.cache/org.swift.swiftpm
            ~/.swiftpm
            Benchmarks/.build
          key: ${{ runner.os }}-bench-swiftpm-${{ hashFiles('Benchmarks/Package.resolved') }}
          restore-keys: ${{ runner.os }}-bench-swiftpm-
      - run: swift package --package-path Benchmarks benchmark baseline update pull_request --no-progress --quiet
      - name: Switch to branch '${{ github.event.pull_request.base.ref }}'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          clean: false
      - run: swift package --package-path Benchmarks benchmark baseline update base --no-progress --quiet
      - name: swift package benchmark baseline check
        id: check
        run: |
          set +e
          echo 'OUTPUT<<EOF' >> "$GITHUB_OUTPUT"
          swift package --package-path Benchmarks benchmark baseline check base pull_request --format markdown >> "$GITHUB_OUTPUT"
          echo 'EOF' >> "$GITHUB_OUTPUT"
      - name: swift package benchmark baseline compare
        id: compare
        run: |
          echo 'OUTPUT<<EOF' >> "$GITHUB_OUTPUT"
          swift package --package-path Benchmarks benchmark baseline compare base pull_request --no-progress --quiet --format markdown >> "$GITHUB_OUTPUT"
          echo 'EOF' >> "$GITHUB_OUTPUT"
      - name: Create summary text
        id: summary
        env:
          CHECK_OUTPUT: ${{ steps.check.outputs.OUTPUT }}
          COMPARE_OUTPUT: ${{ steps.compare.outputs.OUTPUT }}
        run: |
          echo 'SUMMARY<<EOF' >> "$GITHUB_OUTPUT"
          echo '## Benchmark Summary' >> "$GITHUB_OUTPUT"
          echo >> "$GITHUB_OUTPUT"
          echo "$(date)" >> "$GITHUB_OUTPUT"
          echo >> "$GITHUB_OUTPUT"
          echo "$CHECK_OUTPUT" >> "$GITHUB_OUTPUT"
          echo >> "$GITHUB_OUTPUT"
          echo '---' >> "$GITHUB_OUTPUT"
          echo >> "$GITHUB_OUTPUT"
          echo "$COMPARE_OUTPUT" >> "$GITHUB_OUTPUT"
          echo 'EOF' >> "$GITHUB_OUTPUT"
      - name: Create a job summary
        env:
          SUMMARY: ${{ steps.summary.outputs.SUMMARY }}
        run: echo "$SUMMARY" >> "$GITHUB_STEP_SUMMARY"
  comment-benchmark:
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
    needs: benchmark
    runs-on: ubuntu-24.04-arm
    continue-on-error: true
    permissions:
      pull-requests: write
    steps:
      - name: Comment PR
        uses: thollander/actions-comment-pull-request@24bffb9b452ba05a4f3f77933840a6a841d1b32b  # v3.0.1
        with:
          message: ${{ needs.benchmark.outputs.SUMMARY }}
          comment-tag: benchmark
  yamllint:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - run: yamllint --version
      - run: yamllint --strict --config-file .yamllint.yml .
  shellcheck:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - run: shellcheck -V
      - run: git ls-files -z '*.sh' | xargs -0 --no-run-if-empty shellcheck
  results:
    if: ${{ always() }}
    runs-on: ubuntu-24.04-arm
    needs: [test-linux, test-macos, lint, benchmark, yamllint, shellcheck]
    steps:
      - run: exit 1
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
